version: '3.8'

services:
  # ============ Infrastructure ============

  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    environment:
      POSTGRES_DB: banking_auth
      POSTGRES_USER: banking_user
      POSTGRES_PASSWORD: banking_pass_123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - banking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking_user -d banking_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: banking-redis
    command: redis-server --appendonly yes --requirepass redis_pass_123
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - banking-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass_123", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Microservices ============

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: banking-auth-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banking_auth
      DB_USER: banking_user
      DB_PASSWORD: banking_pass_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass_123
      JWT_SECRET: ${JWT_SECRET:-dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKYXZhQmFua2luZ0FwcEVudGVycHJpc2VNb2Rl}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - banking-network

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: banking-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_pass_123
      AUTH_SERVICE_URL: http://auth-service:8081
      JWT_SECRET: ${JWT_SECRET:-dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKYXZhQmFua2luZ0FwcEVudGVycHJpc2VNb2Rl}
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - banking-network

  # ============ Monitoring ============

  # ============ MongoDB ============

  mongodb:
    image: mongo:7
    container_name: banking-mongodb
    environment:
      MONGO_INITDB_DATABASE: banking_accounts
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - banking-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    container_name: banking-mongo-express
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8084:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - banking-network

  # ============ Kafka & Zookeeper ============

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: banking-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: banking-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    networks:
      - banking-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 15s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: banking-kafka-ui
    ports:
      - "8086:8080"
    depends_on:
      - kafka
    networks:
      - banking-network
    environment:
      KAFKA_CLUSTERS_0_NAME: banking-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093

  # ============ Account Microservice ============

  account-service:
    build:
      context: ./backend
      dockerfile: account-service/Dockerfile
    container_name: banking-account-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      JWT_SECRET: ${JWT_SECRET:-dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKYXZhQmFua2luZ0FwcEVudGVycHJpc2VNb2Rl}
    ports:
      - "8083:8083"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - banking-network

  # ============ Transaction Microservice ============

  transaction-service:
    build:
      context: ./backend
      dockerfile: transaction-service/Dockerfile
    container_name: banking-transaction-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banking_transactions
      DB_USER: banking_user
      DB_PASSWORD: banking_pass_123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9093
      ACCOUNT_SERVICE_URL: http://account-service:8083
      JWT_SECRET: ${JWT_SECRET:-dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKYXZhQmFua2luZ0FwcEVudGVycHJpc2VNb2Rl}
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      account-service:
        condition: service_started
    networks:
      - banking-network

  # ============ Monitoring ============

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: banking-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis_pass_123
    ports:
      - "8082:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - banking-network

volumes:
  postgres-data:
  redis-data:
  mongodb-data:

networks:
  banking-network:
    driver: bridge
