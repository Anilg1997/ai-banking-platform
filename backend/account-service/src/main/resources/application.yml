server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: account-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/banking_accounts}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKYXZhQmFua2luZ0FwcEVudGVycHJpc2VNb2Rl}

eureka:
  client:
    enabled: false

logging:
  level:
    com.banking: DEBUG
    org.springframework.data.mongodb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
