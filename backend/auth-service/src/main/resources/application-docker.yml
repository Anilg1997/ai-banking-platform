# Docker profile - overrides localhost to container service names
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:banking_auth}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      password: ${REDIS_PASSWORD:redis_pass_123}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

logging:
  level:
    com.banking: INFO
    org.hibernate.SQL: WARN
